name: Welcome

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - name: Welcome new contributor
        uses: actions/github-script@v7
        with:
          script: |
            const isFirstTime = context.payload.sender.contributions === undefined;
            
            if (context.eventName === 'issues') {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `👋 Thanks for opening your${isFirstTime ? ' first' : ''} issue!\n\nWe'll review it as soon as possible. If you're submitting a generation rule, please make sure to:\n\n- Follow the rule schema\n- Provide examples\n- Test with \`npm run validate-rules\`\n\nCheck out our [Contributing Guide](../CONTRIBUTING.md) for more details!`
              });
            }
            
            if (context.eventName === 'pull_request_target') {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `🎉 Thanks for your${isFirstTime ? ' first' : ''} contribution!\n\nYour PR will be reviewed soon. Please make sure:\n\n- [ ] All checks pass\n- [ ] The PR template is filled out\n- [ ] You've tested your changes locally\n\nWe appreciate your contribution to Bot Name Generator! 💖`
              });
            }
