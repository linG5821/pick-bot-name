  <ellipse cx="78" cy="92" rx="12" ry="18" fill="#FF69B4"/>
  <ellipse cx="128" cy="92" rx="12" ry="18" fill="#FF69B4"/>
  <circle cx="83" cy="87" r="6" fill="#FFF"/>
  <circle cx="133" cy="87" r="6" fill="#FFF"/>
  <circle cx="80" cy="97" r="3" fill="#FFF"/>
  <circle cx="130" cy="97" r="3" fill="#FFF"/>

