<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- 背景 -->
  <rect width="200" height="200" fill="#FFF5E6"/>

  <!-- 猫耳朵 -->
  <path d="M 50 60 L 40 30 L 70 50 Z" fill="#FFB347" stroke="#333" stroke-width="1"/>
  <path d="M 150 60 L 160 30 L 130 50 Z" fill="#FFB347" stroke="#333" stroke-width="1"/>
  <path d="M 50 60 L 45 35 L 65 52 Z" fill="#FFE4D0"/>
  <path d="M 150 60 L 155 35 L 135 52 Z" fill="#FFE4D0"/>

  <!-- 脸部 -->
  <ellipse cx="100" cy="105" rx="55" ry="65" fill="#FFE4D0"/>

  <!-- 头发 -->
  <path d="M 45 85 Q 45 50 75 55 Q 100 45 125 55 Q 155 50 155 85 L 155 110 Q 150 100 135 105 L 65 105 Q 50 100 45 110 Z" fill="#FFB347"/>

  <!-- 大眼睛（anime风格）-->
  <ellipse cx="75" cy="95" rx="18" ry="25" fill="#000"/>
  <ellipse cx="125" cy="95" rx="18" ry="25" fill="#000"/>
  <ellipse cx="78" cy="92" rx="10" ry="15" fill="#FF8C00"/>
  <ellipse cx="128" cy="92" rx="10" ry="15" fill="#FF8C00"/>
  <circle cx="82" cy="88" r="5" fill="#FFF"/>
  <circle cx="132" cy="88" r="5" fill="#FFF"/>
  <circle cx="80" cy="95" r="2" fill="#FFF"/>
  <circle cx="130" cy="95" r="2" fill="#FFF"/>

  <!-- 腮红 -->
  <ellipse cx="60" cy="110" rx="15" ry="10" fill="#FFB6C1" opacity="0.6"/>
  <ellipse cx="140" cy="110" rx="15" ry="10" fill="#FFB6C1" opacity="0.6"/>

  <!-- 可爱的嘴巴 -->
  <path d="M 95 125 Q 100 130 105 125" stroke="#FF69B4" stroke-width="2" fill="none"/>
  <circle cx="100" cy="130" r="2" fill="#FF69B4"/>

  <!-- 猫须 -->
  <line x1="50" y1="110" x2="30" y2="108" stroke="#888" stroke-width="1"/>
  <line x1="50" y1="115" x2="30" y2="117" stroke="#888" stroke-width="1"/>
  <line x1="150" y1="110" x2="170" y2="108" stroke="#888" stroke-width="1"/>
  <line x1="150" y1="115" x2="170" y2="117" stroke="#888" stroke-width="1"/>
</svg>
