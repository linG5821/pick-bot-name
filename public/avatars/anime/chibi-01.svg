<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- 背景 -->
  <rect width="200" height="200" fill="#FFFACD"/>

  <!-- 超大头部（chibi风格）-->
  <ellipse cx="100" cy="90" rx="70" ry="75" fill="#FFE4E1"/>

  <!-- 头发 -->
  <path d="M 30 70 Q 30 20 70 30 Q 100 15 130 30 Q 170 20 170 70 L 170 100 Q 165 90 145 95 L 55 95 Q 35 90 30 100 Z" fill="#FFA07A"/>

  <!-- 超大眼睛（chibi特征）-->
  <ellipse cx="70" cy="85" rx="25" ry="35" fill="#000"/>
  <ellipse cx="130" cy="85" rx="25" ry="35" fill="#000"/>
  <ellipse cx="73" cy="80" rx="15" ry="23" fill="#8B4513"/>
  <ellipse cx="133" cy="80" rx="15" ry="23" fill="#8B4513"/>
  <circle cx="78" cy="73" r="8" fill="#FFF"/>
  <circle cx="138" cy="73" r="8" fill="#FFF"/>
  <circle cx="75" cy="87" r="4" fill="#FFF"/>
  <circle cx="135" cy="87" r="4" fill="#FFF"/>

  <!-- 闪光效果 -->
  <circle cx="82" cy="70" r="3" fill="#FFF" opacity="0.8"/>
  <circle cx="142" cy="70" r="3" fill="#FFF" opacity="0.8"/>

  <!-- 大腮红 -->
  <ellipse cx="50" cy="105" rx="20" ry="15" fill="#FFB6C1" opacity="0.7"/>
  <ellipse cx="150" cy="105" rx="20" ry="15" fill="#FFB6C1" opacity="0.7"/>

  <!-- 小嘴巴 -->
  <ellipse cx="100" cy="120" rx="8" ry="6" fill="#FF69B4"/>

  <!-- 小身体 -->
  <rect x="75" y="160" width="50" height="35" rx="10" fill="#FFE4E1"/>
</svg>
