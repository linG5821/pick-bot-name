<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE5F0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E5F0FF;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="256" height="256" fill="url(#bg)"/>

  <!-- 装饰性元素 -->
  <circle cx="50" cy="50" r="20" fill="#FFB6C1" opacity="0.3"/>
  <circle cx="206" cy="80" r="15" fill="#87CEEB" opacity="0.3"/>
  <circle cx="80" cy="200" r="25" fill="#DDA0DD" opacity="0.3"/>

  <!-- 文字 -->
  <text x="128" y="120" text-anchor="middle" font-size="20" fill="#FF69B4" font-weight="bold">
    二次元头像
  </text>
  <text x="128" y="145" text-anchor="middle" font-size="14" fill="#888">
    加载中...
  </text>

  <!-- 可爱的图标 -->
  <text x="128" y="100" text-anchor="middle" font-size="40">🌸</text>
</svg>
